<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAHID BABA | Quantum AI Global 2026 PRO V5</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Grotesk:wght@300;500;700&family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <style>
        :root {
            --bg-deep: #020202;
            --accent-neon: #00ff9d;
            --accent-blue: #00bcff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-glow: 0 0 10px rgba(0, 255, 157, 0.5);
            --premium-gradient: linear-gradient(135deg, #00ff9d 0%, #00bcff 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Space Grotesk', 'Noto Sans Devanagari', sans-serif; 
            background: var(--bg-deep); 
            color: #fff; 
            overflow-x: hidden;
            min-height: 100vh;
        }

        #particles-js { position: fixed; width: 100%; height: 100%; z-index: 1; }
        .main-container { position: relative; z-index: 10; }

        header {
            padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border);
            position: sticky; top: 0; z-index: 1000; background: rgba(0,0,0,0.8);
        }

        .logo { 
            font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 700; 
            background: var(--premium-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .ticker-bar { background: rgba(0, 255, 157, 0.05); border-bottom: 1px solid var(--accent-neon); padding: 8px 0; font-size: 0.75rem; text-transform: uppercase; }

        /* HERO DASHBOARD */
        .hero-dashboard { padding: 40px 5% 20px; display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .welcome-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 24px; padding: 30px; border-left: 5px solid var(--accent-neon); }
        .time-widget { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px; text-align: center; }
        #clock { font-size: 2.5rem; font-family: 'Orbitron'; color: var(--accent-neon); text-shadow: var(--text-glow); }

        /* CONTENT FEED */
        .content-grid { padding: 20px 5% 100px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .news-card-v2 { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; overflow: hidden; transition: 0.3s; }
        .news-card-v2:hover { transform: translateY(-5px); border-color: var(--accent-neon); }
        
        .media-container { width: 100%; height: 200px; background: #111; overflow: hidden; position: relative; }
        .media-container img, .media-container video, .media-container iframe { width: 100%; height: 100%; object-fit: cover; border: none; }
        
        .tag { position: absolute; top: 10px; left: 10px; background: var(--accent-neon); color: #000; padding: 4px 10px; border-radius: 5px; font-weight: bold; font-size: 0.65rem; z-index: 5; }

        .card-body { padding: 20px; }
        .card-body h3 { font-size: 1.2rem; margin-bottom: 10px; color: var(--accent-blue); }
        .card-body p { font-size: 0.85rem; color: #ccc; line-height: 1.5; margin-bottom: 15px; }

        /* UI ELEMENTS */
        .btn-premium { background: var(--premium-gradient); border: none; padding: 12px; border-radius: 10px; color: #000; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-premium:hover { box-shadow: 0 0 15px var(--accent-neon); }

        /* ADMIN / POSTING OVERLAY */
        #adminOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; overflow-y: auto; padding: 20px; }
        .admin-box { max-width: 500px; margin: 20px auto; background: #0d0d0d; border: 1px solid var(--accent-neon); border-radius: 25px; padding: 30px; }
        
        .form-group { margin-bottom: 15px; }
        label { font-size: 0.75rem; color: var(--accent-neon); display: block; margin-bottom: 5px; }
        input, textarea, select { width: 100%; background: #1a1a1a; border: 1px solid #333; padding: 12px; border-radius: 8px; color: #fff; }

        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--accent-neon); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-size: 1.5rem; cursor: pointer; z-index: 2000; box-shadow: 0 0 20px var(--accent-neon); }

        @media (max-width: 768px) { .hero-dashboard { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="particles-js"></div>

<div class="main-container">
    <div class="ticker-bar"><marquee>🔴 LIVE: Intelligence Reporting System Active... Shahid Baba Quantum Terminal... Everyone can post their Proofs now...</marquee></div>

    <header>
        <div class="logo">SHAHID BABA AI</div>
        <div id="battery" style="color: var(--accent-neon); font-size: 0.8rem;"></div>
    </header>

    <section class="hero-dashboard">
        <div class="welcome-card">
            <h1 id="greetingText">Loading...</h1>
            <p style="color: var(--accent-blue);">Quantum AI Global Reporting 2026</p>
            <button class="btn-premium" onclick="activateAI()" id="aiBtn" style="width: auto; margin-top: 15px;">BOOT NEURAL LINK</button>
        </div>
        <div class="time-widget">
            <div id="clock">00:00:00</div>
            <div id="dateText" style="font-size: 0.8rem; color: #888;"></div>
        </div>
    </section>

    <div class="content-grid" id="mainFeed"></div>
</div>

<div class="fab" onclick="toggleAdmin()">
    <i class="fas fa-plus"></i>
</div>

<div id="adminOverlay">
    <div class="admin-box">
        <h2 style="color: var(--accent-neon); text-align: center; margin-bottom: 20px;">PUBLIC CONSOLE</h2>
        
        <div class="form-group">
            <label>Reporter Name</label>
            <input type="text" id="pName" placeholder="Aapka Naam...">
        </div>
        
        <div class="form-group">
            <label>Headline</label>
            <input type="text" id="pTitle" placeholder="Khabar ka Title...">
        </div>

        <div class="form-group">
            <label>Media Link (Image/YouTube URL)</label>
            <input type="text" id="pLink" placeholder="https://youtube.com/watch?v=... or Image link">
        </div>

        <div class="form-group">
            <label>Full Report / Proof Description</label>
            <textarea id="pDesc" rows="4" placeholder="Poori jaankari yahan likhein..."></textarea>
        </div>

        <div class="form-group">
            <label>Master Key (Sirf Shahid Bhai ke liye, baaki khali chhodein)</label>
            <input type="password" id="pKey" placeholder="Leave empty for public post">
        </div>

        <button class="btn-premium" onclick="handlePublish()">PUBLISH TO FEED</button>
        <p onclick="toggleAdmin()" style="text-align: center; margin-top: 15px; cursor: pointer; color: #ff4444;">CLOSE TERMINAL</p>
    </div>
</div>

<script>
    const MASTER_KEY = "shahid786"; // Sirf Shahid Bhai ka key
    let aiActive = false;

    // Particles JS Initializer
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 50 },
            "color": { "value": "#00ff9d" },
            "line_linked": { "enable": true, "color": "#00ff9d", "opacity": 0.1 },
            "move": { "enable": true, "speed": 1 }
        }
    });

    // Real-time Clock
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
        document.getElementById('dateText').innerText = now.toDateString();
        
        const hour = now.getHours();
        let msg = (hour < 12) ? "Subah Bakhair" : (hour < 17) ? "Dopahar Mubarak" : "Shab-ba-khair";
        document.getElementById('greetingText').innerText = `${msg}, Shahid Bhai`;
    }
    setInterval(updateClock, 1000);

    function activateAI() {
        aiActive = true;
        document.getElementById('aiBtn').style.boxShadow = "0 0 20px #00ff9d";
        document.getElementById('aiBtn').innerText = "SYSTEM ONLINE";
        speak("System Online. Swagat hai Shahid Bhai. Feed taiyar hai.");
    }

    function speak(text) {
        if(!aiActive) return;
        window.speechSynthesis.cancel();
        let utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1.0;
        window.speechSynthesis.speak(utterance);
    }

    function toggleAdmin() {
        const el = document.getElementById('adminOverlay');
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    // Auto-Save Posting Logic
    function handlePublish() {
        const name = document.getElementById('pName').value || "Public Reporter";
        const title = document.getElementById('pTitle').value;
        const desc = document.getElementById('pDesc').value;
        const link = document.getElementById('pLink').value;
        const key = document.getElementById('pKey').value;

        if(!title || !desc) return alert("Headline aur Description zaroori hai!");

        const isAdmin = (key === MASTER_KEY);

        const newPost = {
            id: Date.now(),
            name: isAdmin ? "👑 " + name : "👤 " + name,
            title: title,
            desc: desc,
            link: link || 'https://images.unsplash.com/photo-1585241936939-be4099591252?w=800',
            time: new Date().toLocaleString(),
            isAdmin: isAdmin
        };

        // LocalStorage mein save karna (Auto-save)
        let db = JSON.parse(localStorage.getItem('shahid_news_db')) || [];
        db.unshift(newPost);
        localStorage.setItem('shahid_news_db', JSON.stringify(db));

        speak("Reporting complete. Post feed mein jodi gayi hai.");
        
        // Reset fields
        document.getElementById('pTitle').value = '';
        document.getElementById('pDesc').value = '';
        document.getElementById('pLink').value = '';
        document.getElementById('pKey').value = '';
        
        toggleAdmin();
        renderFeed();
    }

    function getMediaHTML(url) {
        if(url.includes('youtube.com') || url.includes('youtu.be')) {
            let vidId = "";
            if(url.includes('v=')) vidId = url.split('v=')[1].split('&')[0];
            else vidId = url.split('/').pop();
            return `<iframe src="https://www.youtube.com/embed/${vidId}" allowfullscreen></iframe>`;
        }
        return `<img src="${url}" onerror="this.src='https://images.unsplash.com/photo-1504711432869-efd597cdd042?w=800'">`;
    }

    // Render Feed with Admin-Only Control
    function renderFeed() {
        const feed = document.getElementById('mainFeed');
        const db = JSON.parse(localStorage.getItem('shahid_news_db')) || [];
        
        if(db.length === 0) {
            feed.innerHTML = "<p style='text-align:center; grid-column: 1/-1; color: #555;'>No reports found in terminal.</p>";
            return;
        }

        feed.innerHTML = db.map(post => `
            <div class="news-card-v2" style="${post.isAdmin ? 'border: 1px solid var(--accent-neon)' : ''}">
                <div class="media-container">
                    <span class="tag">${post.isAdmin ? 'VERIFIED SOURCE' : 'PUBLIC PROOF'}</span>
                    ${getMediaHTML(post.link)}
                </div>
                <div class="card-body">
                    <div style="font-size: 0.7rem; color: var(--accent-neon); margin-bottom: 5px;">Reporter: ${post.name}</div>
                    <h3>${post.title}</h3>
                    <p>${post.desc}</p>
                    <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid #222; padding-top:10px; margin-top:10px;">
                        <span style="font-size:0.6rem; color:#555;">${post.time}</span>
                        <button onclick="deletePost(${post.id})" style="background:none; border:none; color:#ff4444; cursor:pointer; font-size:0.7rem; font-weight:bold;">
                            <i class="fas fa-trash"></i> DELETE
                        </button>
                    </div>
                    <button class="btn-premium" style="margin-top:10px; padding: 8px;" onclick="speak('Headline: ${post.title}. Details: ${post.desc}')">
                        <i class="fas fa-volume-up"></i> SUNEYE
                    </button>
                </div>
            </div>
        `).join('');
    }

    // Secure Delete: Sirf Master Key se hi delete hoga
    function deletePost(id) {
        const key = prompt("Post delete karne ke liye ADMIN MASTER KEY dalein:");
        if (key === MASTER_KEY) {
            let db = JSON.parse(localStorage.getItem('shahid_news_db')) || [];
            db = db.filter(p => p.id !== id);
            localStorage.setItem('shahid_news_db', JSON.stringify(db));
            renderFeed();
            alert("Post successfully deleted from Quantum database.");
        } else {
            alert("Ghalat Key! Aapko delete karne ka adhikaar nahi hai.");
        }
    }

    window.onload = () => {
        renderFeed();
        updateClock();
        if(navigator.getBattery) {
            navigator.getBattery().then(b => {
                document.getElementById('battery').innerHTML = `<i class="fas fa-bolt"></i> SYSTEM POWER: ${Math.floor(b.level * 100)}%`;
            });
        }
    };
</script>
</body>
</html>
